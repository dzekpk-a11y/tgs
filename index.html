<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChimpEvent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f1218;
            --card-bg: #181d26;
            --accent-color: #2ea6ff;
            --accent-gradient: linear-gradient(135deg, #2ea6ff 0%, #1a73e8 100%);
            --text-color: #ffffff;
            --text-secondary: #8c93a0;
            --border-color: #262e3d;
            --error-color: #ff4b4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточки */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        /* Блок профиля и подарка */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            margin-bottom: 16px;
        }

        .gift-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            object-fit: cover;
            background: var(--border-color);
            padding: 4px;
            box-shadow: 0 4px 12px rgba(46, 166, 255, 0.2);
        }

        .user-info h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Баланс / Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
        }

        .stat-box span {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-box b {
            font-size: 18px;
            color: var(--accent-color);
        }

        /* Кнопки */
        .btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(46, 166, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            box-shadow: none;
            color: var(--text-color);
        }

        /* Оверлей подписки */
        #sub-wall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .wall-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }

        .wall-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .wall-content h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .wall-content p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .hidden {
            display: none !important;
        }

        .link-input-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .link-input-group input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            font-size: 13px;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- Экран блокировки (Обязательная подписка) -->
    <div id="sub-wall">
        <div class="wall-content">
            <div class="wall-icon">📢</div>
            <h3>Требуется подписка</h3>
            <p>Чтобы пользоваться приложением и получить бонус, подпишитесь на наш официальный канал.</p>
            <a href="https://t.me/chimpevents" target="_blank" class="btn" style="margin-bottom: 12px;">Подписаться на канал</a>
            <button class="btn btn-secondary" onclick="checkSubscription()">Я подписался ✓</button>
        </div>
    </div>

    <!-- Основной интерфейс приложения -->
    <div class="container">
        <!-- Карточка профиля -->
        <div class="card">
            <div class="profile-header">
                <img src="https://cdn.phototourl.com/free/2026-07-20-a18626ce-fce3-48f7-958e-d862f7985647.webp" alt="Gift" class="gift-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4264/4264853.png'">
                <div class="user-info">
                    <h2 id="username">Загрузка...</h2>
                    <p>ID: <span id="user-id">---</span></p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span>Баланс</span>
                    <b id="user-balance">0</b>
                </div>
                <div class="stat-box">
                    <span>Рефералы</span>
                    <b id="ref-count">0</b>
                </div>
            </div>

            <button class="btn" onclick="claimBonus()">🎁 Забрать бонус</button>
        </div>

        <!-- Реферальная секция -->
        <div class="card" style="text-align: left;">
            <h3 style="font-size: 16px; margin-bottom: 8px;">👥 Реферальная система</h3>
            <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 14px;">Приглашайте друзей и получайте награды мгновенно.</p>
            
            <button class="btn" onclick="shareRefLink()">🚀 Пригласить друга</button>
            
            <div class="link-input-group" style="margin-top: 12px;">
                <input type="text" id="ref-link" readonly value="Генерация ссылки...">
                <button class="btn btn-secondary" style="width: auto; padding: 10px 14px;" onclick="copyRefLink()">📋</button>
            </div>
        </div>
    </div>

    <script>
        // Адрес бэкенда на Wispbyte
        const API_URL = "http://78.154.103.11:15922";

        const tg = window.Telegram.WebApp;
        tg.expand();

        let userId = 123456;
        let userName = "Гость";

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            userName = tg.initDataUnsafe.user.first_name || "Пользователь";
        }

        document.getElementById('username').innerText = userName;
        document.getElementById('user-id').innerText = userId;

        // Генерация реферальной ссылки
        const botUsername = "chimpeventbot";
        const refUrl = `https://t.me/${botUsername}?start=ref_${userId}`;
        document.getElementById('ref-link').value = refUrl;

        function shareRefLink() {
            const text = encodeURIComponent("Присоединяйся к боту и получай NFT подарки! 🎁");
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(refUrl)}&text=${text}`;
            if (tg.openTelegramLink) {
                tg.openTelegramLink(shareUrl);
            } else {
                window.open(shareUrl, '_blank');
            }
        }

        function copyRefLink() {
            const input = document.getElementById('ref-link');
            input.select();
            navigator.clipboard.writeText(input.value);
            tg.HapticFeedback.notificationOccurred('success');
            alert('Реферальная ссылка скопирована!');
        }

        function checkSubscription() {
            document.getElementById('sub-wall').classList.add('hidden');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function claimBonus() {
            tg.HapticFeedback.impactOccurred('medium');
            alert('Бонус успешно получен!');
        }
    </script>
</body>
</html>
