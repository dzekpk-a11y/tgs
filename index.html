<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --neon-glow: rgba(99, 102, 241, 0.4);
        }
        body.light {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-secondary: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .profile-card, .progress-card, .inventory-section { background-color: var(--card-bg); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .user-info { display: flex; justify-content: space-between; align-items: center; }
        .username { font-size: 18px; font-weight: 700; }
        .ref-box { display: flex; gap: 8px; }
        .ref-input { flex: 1; background: var(--bg-color); border: 1px solid var(--text-secondary); border-radius: 8px; padding: 8px 12px; color: var(--text-color); font-size: 14px; outline: none; }
        .btn { background-color: var(--accent-color); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn:disabled { background-color: var(--text-secondary); opacity: 0.6; cursor: not-allowed; }
        .progress-card { align-items: center; text-align: center; }
        .gift-icon { font-size: 48px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .progress-bar-container { width: 100%; background-color: var(--bg-color); border-radius: 8px; height: 12px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); width: 0%; transition: width 0.6s ease; }
        .progress-text { font-size: 14px; color: var(--text-secondary); }
        .inventory-content { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; color: var(--text-secondary); font-size: 14px; text-align: center; }
        .nft-card { position: relative; width: 100%; background: var(--bg-color); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(99,102,241,0.3); }
        .nft-image-wrapper { position: relative; width: 100%; height: 180px; }
        .nft-image { width: 100%; height: 100%; object-fit: cover; transition: filter 0.4s ease; }
        .nft-image.blurred { filter: blur(8px); }
        .withdraw-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,23,42,0.85); color: #a855f7; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 16px; box-shadow: 0 0 15px var(--neon-glow); display: none; z-index: 2; }
        .nft-card.withdrawing .withdraw-badge { display: block; }
        .nft-footer { padding: 12px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .nft-name { font-weight: 600; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="user-info"><span class="username" id="usernameDisplay">Загрузка...</span></div>
            <div class="ref-box">
                <input type="text" id="refLinkInput" class="ref-input" readonly value="Генерация...">
                <button class="btn" id="copyBtn" onclick="copyRefLink()">Копировать</button>
            </div>
        </div>
        <div class="progress-card">
            <div class="gift-icon">🎁</div>
            <div style="font-size:16px; font-weight:600;">Цель: пригласить 3 друзей</div>
            <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            <div class="progress-text" id="progressText">Приглашено: 0 / 3</div>
            <button class="btn" id="claimNftBtn" style="width: 100%;" disabled onclick="claimNft()">Обменять на NFT</button>
        </div>
        <div class="inventory-section">
            <div style="font-size:16px; font-weight:600;">Ваш инвентарь (Профиль)</div>
            <div class="inventory-content" id="inventoryContent">У вас пока нет подарков</div>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.colorScheme === 'light') document.body.classList.add('light');

        // ЗАМЕНИТЬ НА ТВОЙ СЕРВЕР WISPBYTE (адрес бэкенда, например: https://node1.wispbyte.com:25565)
        const API_URL = "http://78.154.103.11:15922";

        const user = tg.initDataUnsafe?.user || { id: 12345, username: "Test" };
        let appState = { invited_count: 0, nft_status: "none", ref_link: "" };

        async function syncUserData() {
            try {
                const res = await fetch(`${API_URL}/api/user/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id, username: user.username || user.first_name })
                });
                appState = await res.json();
                updateUI();
            } catch (e) { console.error(e); }
        }

        function updateUI() {
            document.getElementById('usernameDisplay').innerText = `@${appState.username}`;
            document.getElementById('refLinkInput').value = appState.ref_link;
            const count = Math.min(appState.invited_count, 3);
            document.getElementById('progressBarFill').style.width = (count / 3) * 100 + '%';
            document.getElementById('progressText').innerText = `Приглашено: ${appState.invited_count} / 3`;
            document.getElementById('claimNftBtn').disabled = !(appState.invited_count >= 3 && appState.nft_status === 'none');
            renderInventory();
        }

        function renderInventory() {
            const inv = document.getElementById('inventoryContent');
            if (appState.nft_status === 'none') { inv.innerHTML = 'У вас пока нет подарков'; return; }
            const isW = appState.nft_status === 'withdrawing';
            inv.innerHTML = `
                <div class="nft-card ${isW ? 'withdrawing' : ''}">
                    <div class="nft-image-wrapper">
                        <div class="withdraw-badge">В процессе</div>
                        <img src="https://images.unsplash.com/photo-1563089145-599997674d42?w=500&auto=format&fit=crop&q=60" class="nft-image ${isW ? 'blurred' : ''}">
                    </div>
                    <div class="nft-footer">
                        <span class="nft-name">Jolly Chimp</span>
                        ${!isW ? '<button class="btn" style="padding:6px 12px; font-size:13px;" onclick="withdrawNft()">Вывести</button>' : ''}
                    </div>
                </div>`;
        }

        async function claimNft() {
            tg.showConfirm("Обменять 3 рефералов на подарок Jolly Chimp?", async (ok) => {
                if (ok) {
                    const res = await fetch(`${API_URL}/api/nft/claim`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: user.id }) });
                    if ((await res.json()).success) { syncUserData(); tg.showPopup({ title: 'Успешно!', message: 'Подарок в инвентаре!' }); }
                }
            });
        }

        async function withdrawNft() {
            tg.showConfirm("Подтвердите вывод подарка.", async (ok) => {
                if (ok) {
                    const res = await fetch(`${API_URL}/api/nft/withdraw`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: user.id }) });
                    if ((await res.json()).success) { syncUserData(); tg.showPopup({ title: 'Запрос принят', message: 'Ожидайте вывода.' }); }
                }
            });
        }

        function copyRefLink() {
            const i = document.getElementById('refLinkInput'); i.select(); navigator.clipboard.writeText(i.value);
            const b = document.getElementById('copyBtn'); b.innerText = 'Готово!'; setTimeout(() => b.innerText = 'Копировать', 2000);
        }

        syncUserData();
    </script>
</body>
</html>
