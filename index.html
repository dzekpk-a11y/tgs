<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash & Web3 Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131c2e;
            --accent-indigo: #6366f1;
            --accent-emerald: #10b981;
            --accent-danger: #ef4444;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: #1f293d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 30px;
        }

        /* Шапка */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
        }

        .stars-balance {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 16px;
            color: #fbbf24;
            cursor: pointer;
        }

        /* Навигация (Вкладки) */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-indigo);
            color: white;
        }

        .view-section {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .view-section.active {
            display: flex;
        }

        /* Карточки */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Арена Краша */
        .crash-arena {
            height: 220px;
            background: #070a12;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .multiplier-display {
            font-size: 42px;
            font-weight: 800;
            z-index: 2;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        .crash-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(180deg, rgba(99,102,241,0.4) 0%, rgba(99,102,241,0) 100%);
            transition: height 0.05s linear;
        }

        /* Инпуты и Кнопки */
        .input-group {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            background: #070a12;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .btn {
            width: 100%;
            background: var(--accent-indigo);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99,102,241,0.4);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-emerald { background: var(--accent-emerald); box-shadow: 0 4px 14px rgba(16,185,129,0.4); }
        .btn-danger { background: var(--accent-danger); box-shadow: 0 4px 14px rgba(239,68,68,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.06); box-shadow: none; color: var(--text-secondary); }

        /* Живые ставки */
        .live-bets {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
        }

        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background: rgba(255,255,255,0.02);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Профиль и Инвентарь */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #252f4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .progress-bar-container {
            background: #070a12;
            border-radius: 8px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-indigo);
            width: 0%;
            transition: width 0.3s;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            max-height: 240px;
            overflow-y: auto;
        }

        .nft-card {
            background: #070a12;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nft-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .history-list {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .history-badge {
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Шапка -->
        <div class="header-bar">
            <span id="user-nicename">Игрок</span>
            <div class="stars-balance" onclick="withdrawStarsPrompt()">
                ⭐ <span id="stars-val">1000</span>
            </div>
        </div>

        <!-- Навигация -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('crash')">🎮 Crash</button>
            <button class="tab-btn" onclick="switchTab('profile')">👤 Профиль</button>
        </div>

        <!-- ВКЛАДКА КРАШ -->
        <div id="view-crash" class="view-section active">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 13px; color: var(--text-secondary);">История раундов:</span>
                    <div class="history-list" id="history-list"></div>
                </div>

                <div class="crash-arena">
                    <div class="crash-line" id="crash-line" style="height: 0%;"></div>
                    <div class="multiplier-display" id="multiplier-view">1.00x</div>
                </div>

                <div class="input-group">
                    <input type="number" id="bet-amount" placeholder="Сумма ставки" value="100">
                </div>

                <button class="btn" id="action-btn" onclick="handleMainAction()">Поставить ставку</button>
            </div>

            <div class="card">
                <h3 style="font-size: 14px; color: var(--text-secondary);">Живые ставки раунда</h3>
                <div class="live-bets" id="live-bets-list">
                    <div style="text-align: center; color: var(--text-secondary); font-size: 12px;">Нет активных ставок</div>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА ПРОФИЛЬ -->
        <div id="view-profile" class="view-section">
            <div class="card">
                <div class="profile-header">
                    <div class="avatar" id="profile-avatar">P</div>
                    <div>
                        <h3 id="profile-name">Игрок</h3>
                        <p style="font-size: 12px; color: var(--text-secondary);">ID: <span id="profile-id">---</span></p>
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px;">
                        <span>Приглашено друзей:</span>
                        <b><span id="ref-count">0</span> / 3</b>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="ref-progress"></div>
                    </div>
                </div>

                <button class="btn" id="exchange-btn" onclick="exchangeRefs()" style="opacity: 0.5; pointer-events: none;">Обменять 3 реферала на подарок</button>
            </div>

            <div class="card">
                <h3 style="font-size: 14px;">Инвентарь подарков (<span id="inv-count">0</span>)</h3>
                <div class="inventory-grid" id="inventory-list">
                    <div style="text-align: center; color: var(--text-secondary); font-size: 13px; padding: 20px;">Инвентарь пуст</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const HTTP_API = "http://78.154.103.11:15922";
        const WS_API = "ws://78.154.103.11:15922/ws/crash";

        let userId = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 123456;
        let userName = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";

        document.getElementById('user-nicename').innerText = userName;
        document.getElementById('profile-name').innerText = userName;
        document.getElementById('profile-id').innerText = userId;
        document.getElementById('profile-avatar').innerText = userName.charAt(0);

        let userBalance = 1000;
        let myBetPlaced = false;
        let gameStateData = { status: "waiting" };

        let ws;
        function connectWS() {
            ws = new WebSocket(WS_API);
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                gameStateData = data;
                updateUI(data);
            };
            ws.onclose = function() {
                setTimeout(connectWS, 2000);
            };
        }
        connectWS();

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            if(tab === 'crash') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('view-crash').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('view-profile').classList.add('active');
                fetchUserData();
            }
        }

        function updateUI(data) {
            document.getElementById('multiplier-view').innerText = data.multiplier.toFixed(2) + "x";
            
            const line = document.getElementById('crash-line');
            if (data.status === 'flying') {
                let heightPct = Math.min(100, (data.multiplier - 1) * 20);
                line.style.height = heightPct + "%";
            } else if (data.status === 'crashed') {
                line.style.height = "100%";
            } else {
                line.style.height = "0%";
            }

            const histContainer = document.getElementById('history-list');
            histContainer.innerHTML = data.history.map(h => `<div class="history-badge">${h}x</div>`).join('');

            const btn = document.getElementById('action-btn');
            const myBet = data.bets[userId];

            if (data.status === 'waiting') {
                if (myBet) {
                    btn.innerText = "Ставка принята (" + myBet.amount + " ⭐)";
                    btn.className = "btn btn-secondary";
                    btn.disabled = true;
                } else {
                    myBetPlaced = false;
                    btn.innerText = "Поставить ставку";
                    btn.className = "btn";
                    btn.disabled = false;
                }
            } else if (data.status === 'flying') {
                if (myBet && !myBet.cashed_out) {
                    btn.innerText = "Забрать из игры";
                    btn.className = "btn btn-emerald";
                    btn.disabled = false;
                } else if (myBet && myBet.cashed_out) {
                    let desc = `Забрано: ${myBet.win}⭐`;
                    if(myBet.gifts_won > 0) desc += ` (+${myBet.gifts_won} подарок 🎁)`;
                    btn.innerText = desc;
                    btn.className = "btn btn-secondary";
                    btn.disabled = true;
                } else {
                    btn.innerText = "График летит";
                    btn.className = "btn btn-secondary";
                    btn.disabled = true;
                }
            } else if (data.status === 'crashed') {
                btn.innerText = "Взрыв! Ожидание...";
                btn.className = "btn btn-danger";
                btn.disabled = true;
            }

            const liveList = document.getElementById('live-bets-list');
            const betsEntries = Object.entries(data.bets);
            if (betsEntries.length === 0) {
                liveList.innerHTML = `<div style="text-align: center; color: var(--text-secondary); font-size: 12px;">Нет активных ставок</div>`;
            } else {
                liveList.innerHTML = betsEntries.map(([uid, b]) => {
                    let statusText = "В игре ✈️";
                    if (b.cashed_out === true || b.cashed_out === "lost") statusText = "Проиграл ❌";
                    else if (b.cashed_out) {
                        statusText = `Забрал ${b.cashed_out}x (${b.win}⭐`;
                        if(b.gifts_won > 0) statusText += ` + ${b.gifts_won}🎁`;
                        statusText += `)`;
                    }
                    return `<div class="bet-row"><span>${b.name} (${b.amount}⭐)</span><span>${statusText}</span></div>`;
                }).join('');
            }
        }

        function handleMainAction() {
            const amountInput = document.getElementById('bet-amount');
            const amount = parseFloat(amountInput.value);

            if (gameStateData.status === 'waiting' && !myBetPlaced) {
                if (isNaN(amount) || amount <= 0) return alert('Введите корректную сумму');
                ws.send(JSON.stringify({ action: "bet", user_id: userId, name: userName, amount: amount }));
                myBetPlaced = true;
                userBalance -= amount;
                document.getElementById('stars-val').innerText = userBalance;
            } else if (gameStateData.status === 'flying') {
                ws.send(JSON.stringify({ action: "cashout", user_id: userId }));
            }
        }

        function fetchUserData() {
            fetch(`${HTTP_API}/api/user?user_id=${userId}&name=${encodeURIComponent(userName)}`)
                .then(res => res.json())
                .then(user => {
                    userBalance = user.balance;
                    document.getElementById('stars-val').innerText = user.balance;
                    document.getElementById('ref-count').innerText = user.refs;
                    
                    const progress = Math.min(100, (user.refs / 3) * 100);
                    document.getElementById('ref-progress').style.width = progress + "%";

                    const exBtn = document.getElementById('exchange-btn');
                    if (user.refs >= 3) {
                        exBtn.style.opacity = "1";
                        exBtn.style.pointerEvents = "auto";
                        exBtn.innerText = "Обменять 3 реферала на подарок";
                    } else {
                        exBtn.style.opacity = "0.5";
                        exBtn.style.pointerEvents = "none";
                        exBtn.innerText = `Обменять 3 реферала (${user.refs}/3)`;
                    }

                    renderInventory(user.inventory);
                });
        }

        function renderInventory(inventory) {
            document.getElementById('inv-count').innerText = inventory.length;
            const container = document.getElementById('inventory-list');
            
            if (!inventory || inventory.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-secondary); font-size: 13px; padding: 20px;">Инвентарь пуст</div>`;
                return;
            }

            container.innerHTML = inventory.map((item, index) => `
                <div class="nft-card">
                    <img src="https://cdn.phototourl.com/free/2026-07-20-a18626ce-fce3-48f7-958e-d862f7985647.webp" class="nft-img">
                    <div style="flex: 1;">
                        <h4 style="font-size: 14px;">${item}</h4>
                        <p style="font-size: 11px; color: #fbbf24;">Цена продажи: 700 ⭐</p>
                    </div>
                    <button class="btn btn-emerald" style="width: auto; padding: 8px 12px; font-size: 12px;" onclick="sellItem(${index})">Продать</button>
                </div>
            `).join('');
        }

        function sellItem(index) {
            fetch(`${HTTP_API}/api/sell_nft`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, index: index })
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    userBalance = data.balance;
                    document.getElementById('stars-val').innerText = userBalance;
                    renderInventory(data.inventory);
                    alert('Подарок успешно продан за 700 ⭐!');
                } else {
                    alert('Ошибка продажи');
                }
            });
        }

        function exchangeRefs() {
            fetch(`${HTTP_API}/api/exchange_refs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    alert('Успешно! Подарок Jolly Chimp добавлен в инвентарь.');
                    fetchUserData();
                } else {
                    alert('Недостаточно рефералов');
                }
            });
        }

        function withdrawStarsPrompt() {
            tg.showConfirm("Вы уверены, что хотите вывести все Telegram Stars?", function(confirmed) {
                if(confirmed) {
                    fetch(`${HTTP_API}/api/withdraw_stars`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    }).then(res => res.json()).then(data => {
                        if(data.success) {
                            userBalance = 0;
                            document.getElementById('stars-val').innerText = 0;
                            alert('Заявка на вывод Stars принята!');
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
